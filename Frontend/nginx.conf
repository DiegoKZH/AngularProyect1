# server configuration only; will be placed in /etc/nginx/conf.d/default.conf
# environment variable substitution is handled by entrypoint via envsubst

server {
    listen 80;
    server_name _;

    access_log /dev/stdout;
    error_log /dev/stderr info;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Reescribir todas las rutas a index.html para Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy al backend
    location /api/ {
        # backend host/port come from environment (set in compose file)
        proxy_pass ${API_URL};
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache control para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No cachear index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
