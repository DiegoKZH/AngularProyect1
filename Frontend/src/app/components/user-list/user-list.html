<section class="user-list">
  <h2>Lista de Usuarios Dev</h2>

  <div class="search" style="margin-bottom:.75rem">
    <input
      type="text"
      placeholder="Buscar usuario..."
      [(ngModel)]="filtro"
    />
  </div>

  <ul>
    <li *ngFor="let persona of usuariosFiltrados; let i = index" class="item">
      <div>
        {{ i + 1 }} - {{ persona.nombre }}
        <small *ngIf="persona?.raw?.role" style="margin-left:8px; color:gray;">
          [{{ persona.raw.role }}]
        </small>
        <div *ngIf="persona?.raw?.passwordHash" style="font-family:monospace; font-size:0.8em; color:#666; margin-top:4px;">
          Hash: {{ persona.raw.passwordHash }}
        </div>
      </div>
      <div class="actions">
        <button (click)="eliminarPersona(persona)" class="btn ghost">Eliminar</button>
        <button (click)="editarPersona(persona)" class="btn ghost">Editar</button>
        <button (click)="seleccionarPersona(persona.nombre)" class="btn">Ver detalle</button>
      </div>
    </li>
  </ul>

  <p *ngIf="usuariosFiltrados.length === 0">Ya no queda usuarios :(</p>
</section>
