version: '3.8'

services:
  # Base de Datos PostgreSQL (para desarrollo local)
  postgres:
    image: postgres:16-alpine
    container_name: proyect1_postgres_local
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123456
      POSTGRES_DB: proyect1_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proyect1_local_network
    restart: unless-stopped

volumes:
  postgres_data_local:

networks:
  proyect1_local_network:
    driver: bridge
