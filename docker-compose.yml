#version: '3.8'

services:
  # Base de Datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: proyect1_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123456
      POSTGRES_DB: proyect1_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proyect1_network

  # Backend ASP.NET Core
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: proyect1_backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5156
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=proyect1_db;Username=admin;Password=admin123456"
      # Permite CORS desde el frontend en Docker
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://frontend"
    ports:
      - "5156:5156"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./Backend:/app/src
    networks:
      - proyect1_network
    restart: unless-stopped

  # Frontend Angular
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: proyect1_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:5156/api
    networks:
      - proyect1_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  proyect1_network:
    driver: bridge
